name: TermHub
options:
  bundleIdPrefix: com.termhub
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  minimumXcodeGenVersion: "2.40"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

schemes:
  TermHub:
    build:
      targets:
        TermHub: all
        TermHubTests: [test]
    test:
      targets:
        - TermHubTests
  TermHubMCP:
    build:
      targets:
        TermHubMCP: all
        TermHubMCPTests: [test]
    test:
      targets:
        - TermHubMCPTests

targets:
  TermHub:
    type: application
    platform: macOS
    sources:
      - TermHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.app
        PRODUCT_NAME: TermHub
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: TermHub/App/TermHub.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TermHub/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - termhub
            CFBundleURLName: com.termhub.app
    dependencies:
      - package: SwiftTerm
  TermHubMCP:
    type: tool
    platform: macOS
    sources:
      - TermHubMCP
      - path: TermHub/Services/IPCProtocol.swift
        type: file
      - path: TermHub/Services/CommandRunner.swift
        type: file
      - path: TermHub/Services/GitService.swift
        type: file
      - path: TermHub/Services/TmuxService.swift
        type: file
      - path: TermHub/Services/DockerSandboxService.swift
        type: file
      - path: TermHub/Services/PersistenceService.swift
        type: file
      - path: TermHub/Utilities/ShellEnvironment.swift
        type: file
      - path: TermHub/Models/ManagedFolder.swift
        type: file
      - path: TermHub/Models/TerminalSession.swift
        type: file
      - path: TermHub/Models/GitStatus.swift
        type: file
      - path: TermHub/Models/GitDiff.swift
        type: file
      - path: TermHub/Models/SandboxInfo.swift
        type: file
      - path: TermHub/Models/DetailTab.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.mcp
        PRODUCT_NAME: termhub-mcp
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
    postBuildScripts:
      - script: |
          INSTALL_DIR="${HOME}/Library/Application Support/TermHub"
          mkdir -p "$INSTALL_DIR"
          cp -f "${BUILT_PRODUCTS_DIR}/termhub-mcp" "$INSTALL_DIR/termhub-mcp"
        name: Install termhub-mcp to Application Support
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/termhub-mcp
        outputFiles:
          - $(HOME)/Library/Application Support/TermHub/termhub-mcp
  TermHubTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TermHubTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: TermHub
  TermHubMCPTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TermHubMCPTests
      - path: TermHubMCP/MCPProtocol.swift
        type: file
      - path: TermHubMCP/MCPServer.swift
        type: file
      - path: TermHubMCP/MCPTools.swift
        type: file
      - path: TermHubMCP/IPCClient.swift
        type: file
      - path: TermHub/Services/IPCProtocol.swift
        type: file
      - path: TermHub/Services/CommandRunner.swift
        type: file
      - path: TermHub/Services/GitService.swift
        type: file
      - path: TermHub/Services/TmuxService.swift
        type: file
      - path: TermHub/Services/DockerSandboxService.swift
        type: file
      - path: TermHub/Services/PersistenceService.swift
        type: file
      - path: TermHub/Utilities/ShellEnvironment.swift
        type: file
      - path: TermHub/Models/ManagedFolder.swift
        type: file
      - path: TermHub/Models/TerminalSession.swift
        type: file
      - path: TermHub/Models/GitStatus.swift
        type: file
      - path: TermHub/Models/GitDiff.swift
        type: file
      - path: TermHub/Models/SandboxInfo.swift
        type: file
      - path: TermHub/Models/DetailTab.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.mcptests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
