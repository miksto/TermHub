name: MuxManager
options:
  bundleIdPrefix: com.muxmanager
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  minimumXcodeGenVersion: "2.40"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

targets:
  MuxManager:
    type: application
    platform: macOS
    sources:
      - MuxManager
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.muxmanager.app
        PRODUCT_NAME: MuxManager
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: MuxManager/App/MuxManager.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: SwiftTerm
