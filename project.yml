name: TermHub
options:
  bundleIdPrefix: com.termhub
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  minimumXcodeGenVersion: "2.40"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"

schemes:
  TermHub:
    build:
      targets:
        TermHub: all
        TermHubTests: [test]
    test:
      targets:
        - TermHubTests

targets:
  TermHub:
    type: application
    platform: macOS
    sources:
      - TermHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.app
        PRODUCT_NAME: TermHub
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: TermHub/App/TermHub.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: TermHub/App/Info.plist
      properties:
        ATSApplicationFontsPath: Fonts
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - termhub
            CFBundleURLName: com.termhub.app
    dependencies:
      - package: SwiftTerm
  TermHubTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TermHubTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termhub.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: TermHub
